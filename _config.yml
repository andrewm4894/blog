title: Andrew Maguire
description: >
  Personal notes on machine learning, anomaly detection, data engineering, and side projects.
tagline: Machine learning, anomaly detection, data engineering, and side projects.
author:
  name: Andrew Maguire
social:
  github: https://github.com/andrewm4894
  github_handle: andrewm4894
  linkedin: https://www.linkedin.com/in/andrewm4894/
  twitter: https://x.com/andrewm4894
twitter:
  username: andrewm4894

# Site configuration
baseurl: ""  # No subpath since the entire domain serves the blog
url: "https://andrewm4894.com"  # Your custom domain

# Theme configuration
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  parse_block_html: true
  parse_span_html: true
  auto_ids: true
  auto_id_prefix: 'id-'
  transliterated_header_ids: true
  enable_coderay: false
  # Enable auto-linking of URLs
  auto_links: true
permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude directories and files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _posts_backup
